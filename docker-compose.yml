services:

  mysql:
    image: mysql:8
    container_name: mysql

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ecommerce

    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: backend

    ports:
      - "5000:5000"

    depends_on:
      - mysql

  nginx:
    image: nginx:latest
    container_name: nginx

    ports:
      - "8080:80"

    volumes:
      - ./nginx/conf/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - backend

volumes:
  mysql_data:
